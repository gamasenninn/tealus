version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeline_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeline
      POSTGRES_PASSWORD: lifeline_dev
      POSTGRES_DB: lifeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/migrations:/docker-entrypoint-initdb.d

  postgres_test:
    image: postgres:16-alpine
    container_name: lifeline_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeline_test
      POSTGRES_PASSWORD: lifeline_test
      POSTGRES_DB: lifeline_test
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: lifeline_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
