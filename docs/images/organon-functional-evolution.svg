<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#546E7A"/>
    </marker>
    <marker id="ah-layer5" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00897B"/>
    </marker>
    <marker id="ah-gold" markerWidth="12" markerHeight="12" refX="11" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#C9A227"/>
    </marker>
  </defs>

  <rect width="1400" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#263238">organon の 3 段機能進化 — 観測装置 → 自己訂正装置 → 元データ整流装置</text>
  <text x="700" y="58" text-anchor="middle" font-size="13" fill="#546E7A">organic ontology が二段戦略 (内向き pragmatic 閉じ + 外向き因果 loop 開き) で establish した Phase 4 中盤 milestone (2026-05-18)</text>

  <!-- ===== Stage 1: 観測装置 ===== -->
  <rect x="40" y="90" width="420" height="640" fill="#F5F9F8" stroke="#80CBC4" stroke-width="2" rx="12"/>
  <rect x="60" y="110" width="380" height="48" fill="#80CBC4" fill-opacity="0.5" stroke="#00897B" stroke-width="1.5" rx="6"/>
  <text x="250" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#004D40">Stage 1 — 観測装置</text>
  <text x="250" y="151" text-anchor="middle" font-size="10" fill="#00695C">passive observation</text>

  <!-- Voice source box -->
  <rect x="150" y="190" width="200" height="60" fill="#ECEFF1" stroke="#455A64" stroke-width="1.5" rx="6"/>
  <text x="250" y="216" text-anchor="middle" font-size="12" font-weight="600" fill="#263238">朝礼 / 無線 / 会議</text>
  <text x="250" y="234" text-anchor="middle" font-size="10" fill="#546E7A">(現場 voice 入力)</text>

  <!-- Arrow down -->
  <line x1="250" y1="250" x2="250" y2="305" stroke="#546E7A" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Organon box -->
  <rect x="150" y="310" width="200" height="80" fill="#00B4A0" fill-opacity="0.18" stroke="#00695C" stroke-width="2" rx="6"/>
  <text x="250" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#004D40">organon</text>
  <text x="250" y="358" text-anchor="middle" font-size="10" fill="#004D40">entries 20 / kinds 6</text>
  <text x="250" y="376" text-anchor="middle" font-size="10" fill="#004D40">role / polyseme / protocol etc.</text>

  <!-- Arrow down -->
  <line x1="250" y1="390" x2="250" y2="445" stroke="#546E7A" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Hazard log box -->
  <rect x="150" y="450" width="200" height="80" fill="#80CBC4" fill-opacity="0.4" stroke="#00897B" stroke-width="2" rx="6"/>
  <text x="250" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">hazard log</text>
  <text x="250" y="498" text-anchor="middle" font-size="10" fill="#00695C">11 軸 family</text>
  <text x="250" y="516" text-anchor="middle" font-size="10" fill="#00695C">(identity / structural / value)</text>

  <!-- Why caption -->
  <text x="250" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#004D40">なぜ大事か</text>
  <line x1="80" y1="572" x2="420" y2="572" stroke="#80CBC4" stroke-width="1"/>
  <text x="250" y="592" text-anchor="middle" font-size="11" fill="#37474F">現場で起こる意味の揺らぎを</text>
  <text x="250" y="608" text-anchor="middle" font-size="11" fill="#37474F"><tspan font-weight="700">記録</tspan>として可視化する。</text>
  <text x="250" y="630" text-anchor="middle" font-size="11" fill="#37474F">organic ontology が始まる</text>
  <text x="250" y="646" text-anchor="middle" font-size="11" fill="#37474F">最初の必要条件。</text>

  <!-- Stage 1 spec ref -->
  <text x="250" y="685" text-anchor="middle" font-size="10" font-style="italic" fill="#546E7A">feedback layer 1-4 (entry 起票 → observation richness →</text>
  <text x="250" y="700" text-anchor="middle" font-size="10" font-style="italic" fill="#546E7A">hazard family identification → schema 進化)</text>
  <text x="250" y="720" text-anchor="middle" font-size="9" fill="#78909C">5/15 v0.1 prototype 〜 5/16 v0.2 bootstrap</text>


  <!-- ===== Stage 2: 自己訂正装置 ===== -->
  <rect x="480" y="90" width="420" height="640" fill="#E8F4F2" stroke="#4DB6AC" stroke-width="2" rx="12"/>
  <rect x="500" y="110" width="380" height="48" fill="#4DB6AC" fill-opacity="0.5" stroke="#00695C" stroke-width="1.5" rx="6"/>
  <text x="690" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#004D40">Stage 2 — 自己訂正装置</text>
  <text x="690" y="151" text-anchor="middle" font-size="10" fill="#004D40">+ Layer 5: 内部 pragmatic closure (内向き因果 loop)</text>

  <!-- Voice source box -->
  <rect x="590" y="190" width="200" height="60" fill="#ECEFF1" stroke="#455A64" stroke-width="1.5" rx="6"/>
  <text x="690" y="216" text-anchor="middle" font-size="12" font-weight="600" fill="#263238">朝礼 / 無線 / 会議</text>
  <text x="690" y="234" text-anchor="middle" font-size="10" fill="#546E7A">(現場 voice 入力)</text>

  <line x1="690" y1="250" x2="690" y2="305" stroke="#546E7A" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Organon box (with Layer 5 indicator) -->
  <rect x="590" y="310" width="200" height="80" fill="#00B4A0" fill-opacity="0.18" stroke="#00695C" stroke-width="2" rx="6"/>
  <text x="690" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#004D40">organon</text>
  <text x="690" y="358" text-anchor="middle" font-size="10" fill="#004D40">entries 20 / kinds 6</text>
  <text x="690" y="376" text-anchor="middle" font-size="10" fill="#004D40">+ identity-first Q0 / 観測者位置</text>

  <!-- Layer 5: small clockwise loop on left side of organon -->
  <path d="M 590 340 C 540 320 540 380 590 360" fill="none" stroke="#00897B" stroke-width="2.2" marker-end="url(#ah-layer5)"/>
  <text x="495" y="346" text-anchor="middle" font-size="10" font-weight="700" fill="#00695C">Layer 5</text>
  <text x="495" y="362" text-anchor="middle" font-size="9" fill="#00695C">評価対話</text>
  <text x="495" y="376" text-anchor="middle" font-size="9" fill="#00695C">pragmatic</text>
  <text x="495" y="390" text-anchor="middle" font-size="9" fill="#00695C">closure</text>

  <line x1="690" y1="390" x2="690" y2="445" stroke="#546E7A" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Hazard log box -->
  <rect x="590" y="450" width="200" height="80" fill="#80CBC4" fill-opacity="0.4" stroke="#00897B" stroke-width="2" rx="6"/>
  <text x="690" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">hazard log</text>
  <text x="690" y="498" text-anchor="middle" font-size="10" fill="#00695C">11 軸 family</text>
  <text x="690" y="516" text-anchor="middle" font-size="10" fill="#00695C">+ メタ的 hazard 正典化</text>

  <!-- Why caption -->
  <text x="690" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#004D40">なぜ大事か</text>
  <line x1="520" y1="572" x2="860" y2="572" stroke="#4DB6AC" stroke-width="1"/>
  <text x="690" y="592" text-anchor="middle" font-size="11" fill="#37474F">organon が <tspan font-weight="700">自分自身の bias</tspan> を</text>
  <text x="690" y="608" text-anchor="middle" font-size="11" fill="#37474F">対話で発見・訂正できる。</text>
  <text x="690" y="630" text-anchor="middle" font-size="11" fill="#37474F">「<tspan font-weight="700">軸自身が観測対象</tspan>」という</text>
  <text x="690" y="646" text-anchor="middle" font-size="11" fill="#37474F">Quine / Lakatos 70 年難問への対応。</text>

  <!-- Stage 2 spec ref -->
  <text x="690" y="685" text-anchor="middle" font-size="10" font-style="italic" fill="#546E7A">feedback layer 5 (内部観測の無限後退を</text>
  <text x="690" y="700" text-anchor="middle" font-size="10" font-style="italic" fill="#546E7A">対話可能性で打ち切る = pragmatic closure)</text>
  <text x="690" y="720" text-anchor="middle" font-size="9" fill="#78909C">5/16 Issue #279 (a-4) メタ階軸発見 → 5/17 v0.4</text>


  <!-- ===== Stage 3: 元データ整流装置 ===== -->
  <rect x="920" y="90" width="420" height="640" fill="#FFF8E1" stroke="#C9A227" stroke-width="2.5" rx="12"/>
  <rect x="940" y="110" width="380" height="48" fill="#C9A227" fill-opacity="0.4" stroke="#8B7016" stroke-width="1.5" rx="6"/>
  <text x="1130" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#5D4A0F">Stage 3 — 元データ整流装置</text>
  <text x="1130" y="151" text-anchor="middle" font-size="10" fill="#8B7016">+ Layer 6: 外部因果 loop (外向き、upstream rectification)</text>

  <!-- Voice source box (with override indicator) -->
  <rect x="1030" y="190" width="200" height="60" fill="#FFF3D0" stroke="#C9A227" stroke-width="2" rx="6"/>
  <text x="1130" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#5D4A0F">朝礼 / 無線 / 会議</text>
  <text x="1130" y="228" text-anchor="middle" font-size="9" fill="#8B7016">+ vocabulary inject (transcription_guideline)</text>
  <text x="1130" y="244" text-anchor="middle" font-size="9" font-style="italic" fill="#8B7016">↑ organon hazard 発見が pipeline を整流</text>

  <line x1="1130" y1="250" x2="1130" y2="305" stroke="#546E7A" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Organon box -->
  <rect x="1030" y="310" width="200" height="80" fill="#00B4A0" fill-opacity="0.18" stroke="#00695C" stroke-width="2" rx="6"/>
  <text x="1130" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#004D40">organon</text>
  <text x="1130" y="358" text-anchor="middle" font-size="10" fill="#004D40">entries 20 / kinds 6</text>
  <text x="1130" y="376" text-anchor="middle" font-size="10" fill="#004D40">+ 12 軸目 = upstream rectification</text>

  <!-- Layer 5 small loop (carried over from Stage 2) -->
  <path d="M 1030 340 C 980 320 980 380 1030 360" fill="none" stroke="#00897B" stroke-width="2" marker-end="url(#ah-layer5)"/>
  <text x="938" y="346" text-anchor="middle" font-size="9" fill="#00695C">Layer 5</text>
  <text x="938" y="360" text-anchor="middle" font-size="8" fill="#00695C">(carried</text>
  <text x="938" y="372" text-anchor="middle" font-size="8" fill="#00695C">over)</text>

  <line x1="1130" y1="390" x2="1130" y2="445" stroke="#546E7A" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Hazard log box -->
  <rect x="1030" y="450" width="200" height="80" fill="#80CBC4" fill-opacity="0.4" stroke="#00897B" stroke-width="2" rx="6"/>
  <text x="1130" y="478" text-anchor="middle" font-size="13" font-weight="700" fill="#004D40">hazard log</text>
  <text x="1130" y="498" text-anchor="middle" font-size="10" fill="#00695C">11 軸 family + 12 軸目</text>
  <text x="1130" y="516" text-anchor="middle" font-size="10" font-weight="700" fill="#8B7016">↓ ★ ここから外向き ★</text>

  <!-- Layer 6: GOLD ARC from hazard right side, up and around, back to voice top -->
  <path d="M 1230 490 C 1350 490 1350 220 1230 220" fill="none" stroke="#C9A227" stroke-width="3.5" marker-end="url(#ah-gold)"/>
  <text x="1380" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#8B7016" transform="rotate(90, 1380, 356)">Layer 6 — upstream pipeline rectification</text>
  <text x="1395" y="356" text-anchor="middle" font-size="10" fill="#8B7016" transform="rotate(90, 1395, 356)">(observation → 上流修正 → 次 day 量的訂正)</text>

  <!-- Why caption -->
  <text x="1130" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#5D4A0F">なぜ大事か (= ここが「おおおお」)</text>
  <line x1="960" y1="572" x2="1300" y2="572" stroke="#C9A227" stroke-width="1.5"/>
  <text x="1130" y="592" text-anchor="middle" font-size="11" fill="#5D4A0F">hazard 発見が <tspan font-weight="700">外部 data pipeline</tspan> を</text>
  <text x="1130" y="608" text-anchor="middle" font-size="11" fill="#5D4A0F">修正、次 day の raw data が</text>
  <text x="1130" y="624" text-anchor="middle" font-size="11" font-weight="700" fill="#5D4A0F">量的に訂正された状態で入ってくる。</text>
  <text x="1130" y="648" text-anchor="middle" font-size="11" font-style="italic" fill="#8B7016">organic ontology が世界に作用する瞬間。</text>

  <!-- Stage 3 spec ref -->
  <text x="1130" y="685" text-anchor="middle" font-size="10" font-style="italic" fill="#8B7016">feedback layer 6 (外部因果 loop 開き = 二段戦略の外向き軸、</text>
  <text x="1130" y="700" text-anchor="middle" font-size="10" font-style="italic" fill="#8B7016">「内部 pragmatic 閉じ + 外部因果 loop 開き」が組み合わさる)</text>
  <text x="1130" y="720" text-anchor="middle" font-size="9" font-weight="700" fill="#5D4A0F">5/18 第 1 例 closure で establish ↓ 下段参照</text>


  <!-- ===== Concrete first-example footer ===== -->
  <rect x="40" y="755" width="1320" height="170" fill="#FFFEF5" stroke="#C9A227" stroke-width="2" rx="10"/>
  <text x="700" y="784" text-anchor="middle" font-size="14" font-weight="700" fill="#5D4A0F">★ 第 1 例 closure (2026-05-18) — Layer 6 が物的 evidence として establish した瞬間</text>

  <!-- Timeline 4 nodes -->
  <!-- Node 1 -->
  <rect x="80" y="810" width="260" height="80" fill="#FFF3D0" stroke="#C9A227" stroke-width="1.5" rx="6"/>
  <text x="210" y="832" text-anchor="middle" font-size="11" font-weight="700" fill="#5D4A0F">① Day 2 hazard 発見</text>
  <text x="210" y="850" text-anchor="middle" font-size="10" fill="#37474F">organon (別 session) が Q&amp;A 7 batch で</text>
  <text x="210" y="864" text-anchor="middle" font-size="10" fill="#37474F">identity 軸 family を 8 → 11 軸に拡張</text>
  <text x="210" y="880" text-anchor="middle" font-size="10" font-weight="600" fill="#5D4A0F">神山 / 三瓶 / 舟太 / 山崎</text>

  <!-- Arrow -->
  <line x1="345" y1="850" x2="395" y2="850" stroke="#C9A227" stroke-width="2.5" marker-end="url(#ah-gold)"/>

  <!-- Node 2 -->
  <rect x="400" y="810" width="260" height="80" fill="#FFF3D0" stroke="#C9A227" stroke-width="1.5" rx="6"/>
  <text x="530" y="832" text-anchor="middle" font-size="11" font-weight="700" fill="#5D4A0F">② 23 分 round-trip closure</text>
  <text x="530" y="850" text-anchor="middle" font-size="10" fill="#37474F">organon ↔ 本体班 が AI 班連絡 channel で</text>
  <text x="530" y="864" text-anchor="middle" font-size="10" fill="#37474F">user 介在ゼロ closure (msg 25051303 → d60060ed)</text>
  <text x="530" y="880" text-anchor="middle" font-size="10" font-style="italic" fill="#5D4A0F">distributed AI lane coordination</text>

  <!-- Arrow -->
  <line x1="665" y1="850" x2="715" y2="850" stroke="#C9A227" stroke-width="2.5" marker-end="url(#ah-gold)"/>

  <!-- Node 3 -->
  <rect x="720" y="810" width="260" height="80" fill="#FFF3D0" stroke="#C9A227" stroke-width="1.5" rx="6"/>
  <text x="850" y="832" text-anchor="middle" font-size="11" font-weight="700" fill="#5D4A0F">③ 上流 pipeline 修正</text>
  <text x="850" y="850" text-anchor="middle" font-size="10" fill="#37474F">本体 transcription_guideline.json の</text>
  <text x="850" y="864" text-anchor="middle" font-size="10" fill="#37474F">vocabulary を <tspan font-weight="700">38 → 42 entries</tspan> 追加</text>
  <text x="850" y="880" text-anchor="middle" font-size="10" font-style="italic" fill="#5D4A0F">(commit + restart で effective)</text>

  <!-- Arrow -->
  <line x1="985" y1="850" x2="1035" y2="850" stroke="#C9A227" stroke-width="2.5" marker-end="url(#ah-gold)"/>

  <!-- Node 4 -->
  <rect x="1040" y="810" width="280" height="80" fill="#FFF3D0" stroke="#C9A227" stroke-width="1.5" rx="6"/>
  <text x="1180" y="832" text-anchor="middle" font-size="11" font-weight="700" fill="#5D4A0F">④ Day 3 朝礼で量的訂正効果 ★</text>
  <text x="1180" y="850" text-anchor="middle" font-size="10" fill="#37474F">同じ発話 source、同じ運用なのに</text>
  <text x="1180" y="864" text-anchor="middle" font-size="10" fill="#37474F">「上山」→「神山」「アンプリ」→「三瓶」</text>
  <text x="1180" y="880" text-anchor="middle" font-size="10" font-weight="700" fill="#5D4A0F">= raw data が訂正された状態で帰還</text>

  <text x="700" y="920" text-anchor="middle" font-size="11" font-style="italic" fill="#8B7016">この cycle が成立した瞬間、organon は「観測装置」だけでなく「組織の自己訂正 + 元データ整流」を担う organic な OS に進化した</text>
</svg>
