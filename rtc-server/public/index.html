<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tealus Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }
    #status {
      margin-bottom: 8px;
      padding: 6px 16px;
      border-radius: 8px;
      background: #16213e;
      font-size: 0.85rem;
    }
    .video-container {
      position: relative;
      width: min(720px, 90vw);
      aspect-ratio: 4 / 3;
    }
    /* リモート映像のグリッド */
    .video-grid {
      position: absolute;
      inset: 0;
      display: grid;
      gap: 4px;
      grid-template-columns: 1fr;
      border-radius: 12px;
      overflow: hidden;
    }
    .video-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .video-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .video-grid-item {
      position: relative;
      background: #0f3460;
      overflow: hidden;
    }
    .video-grid-item video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .video-grid-label {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    /* 自分（小・右下 PiP） */
    .video-box.local {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 140px;
      aspect-ratio: 4 / 3;
      background: #0f3460;
      border-radius: 8px;
      overflow: hidden;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .video-box.local video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .video-label {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .call-controls {
      display: none;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      gap: 20px;
    }
    .call-controls.visible { display: flex; }
    .call-ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
      transition: transform 0.15s;
    }
    .call-ctrl-btn:hover { transform: scale(1.1); }
    .call-ctrl-btn.mute { background: rgba(255,255,255,0.2); }
    .call-ctrl-btn.mute.active { background: #ff9800; }
    .call-ctrl-btn.fullscreen { background: rgba(255,255,255,0.2); }
    .call-ctrl-btn.end { background: #e94560; }

    /* スマホ: 映像を全画面に */
    @media (max-width: 768px) {
      body { padding: 0; }
      .video-container {
        width: 100vw;
        height: 100dvh;
        aspect-ratio: auto;
        border-radius: 0;
      }
      .video-grid { border-radius: 0; }
      .video-box.local { bottom: 80px; right: 8px; width: 100px; }
      #connectBtn { position: fixed; bottom: 40%; left: 50%; transform: translateX(-50%); z-index: 5; }
      #status { position: fixed; bottom: calc(40% - 40px); left: 50%; transform: translateX(-50%); z-index: 5; }
      .call-controls { bottom: 24px; }
      .call-ctrl-btn.fullscreen { display: none; }
    }
    #connectBtn {
      margin: 12px 0 4px;
      padding: 12px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    #connectBtn:hover { background: #c73b52; }
    #connectBtn:disabled { background: #555; cursor: default; }
    #connectBtn.connected { background: #e94560; }
    #connectBtn.connected:hover { background: #ff6b81; }
  </style>
</head>
<body>
  <div class="video-container">
    <div class="video-grid" id="videoGrid">
      <!-- JS で動的に参加者の video 要素を追加 -->
    </div>
    <div class="video-box local">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="video-label">自分</div>
    </div>
    <div class="call-controls" id="callControls">
      <button class="call-ctrl-btn mute" id="muteBtn" title="ミュート">🎤</button>
      <button class="call-ctrl-btn fullscreen" id="fullscreenBtn" title="全画面">⛶</button>
      <button class="call-ctrl-btn end" id="endCallBtn" title="通話を終了">✕</button>
    </div>
  </div>
  <button id="connectBtn">接続する</button>
  <div id="status">未接続</div>

  <script src="bundle.js?v=2"></script>
</body>
</html>
